
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vides Blogg — en blogg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1F3B;
    --parchment:#FFF8EE;
    --coral:#FF6B5B;
    --coral-dark:#C23F32;
    --violet:#7B5EA7;
    --violet-dark:#4E3A72;
    --gold:#E8B84B;
    --gold-dark:#8A6516;
    --teal:#2FA898;
    --teal-dark:#1B6A60;
    --ink-text:#2A2A2A;
    --muted:#7A7568;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(232,184,75,0.10), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(123,94,167,0.14), transparent 45%),
      linear-gradient(rgba(27,31,59,0.85), rgba(27,31,59,0.9)),
      url('assets/background.jpg') center/cover no-repeat;
    color:var(--ink-text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.serif{ font-family:'Fraunces', serif; }
  .meta{ font-family:'Space Mono', monospace; letter-spacing:0.02em; }

  /* ---------- Lock screen ---------- */
  #lock-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .seal-card{
    width:100%;
    max-width:420px;
    background:var(--parchment);
    border-radius:6px;
    padding:48px 40px 40px;
    box-shadow:0 30px 60px rgba(0,0,0,0.35);
    text-align:center;
    animation:riseIn .7s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes riseIn{
    from{opacity:0; transform:translateY(18px) scale(.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .seal{
    width:76px; height:76px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--coral), var(--coral-dark));
    margin:0 auto 20px;
    display:flex; align-items:center; justify-content:center;
    color:var(--parchment);
    font-family:'Fraunces', serif;
    font-size:28px;
    box-shadow:0 6px 14px rgba(194,63,50,0.4), inset 0 -6px 10px rgba(0,0,0,0.15);
    transition:transform .5s cubic-bezier(.3,1.4,.5,1), box-shadow .5s ease;
  }
  .seal.cracked{
    transform:scale(1.15) rotate(-8deg);
    background:radial-gradient(circle at 35% 30%, var(--teal), var(--teal-dark));
    box-shadow:0 6px 18px rgba(27,106,96,0.45), inset 0 -6px 10px rgba(0,0,0,0.15);
  }
  .seal-card h1{ font-size:26px; margin:0 0 6px; color:var(--ink); }
  .seal-card p.sub{ color:var(--muted); font-size:14px; margin:0 0 28px; }
  #lock-form{ display:flex; flex-direction:column; gap:14px; }
  #password-input{
    font-family:'Space Mono', monospace;
    font-size:16px;
    padding:13px 16px;
    border-radius:4px;
    border:1.5px solid #E4D8C0;
    background:#fff;
    color:var(--ink);
    text-align:center;
    letter-spacing:0.08em;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  #password-input:focus{ border-color:var(--violet); box-shadow:0 0 0 3px rgba(123,94,167,0.15); }
  #password-input.shake{ animation:shake .4s; border-color:var(--coral-dark); }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(5px);}
  }
  #unlock-btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:15px;
    padding:13px;
    border:none;
    border-radius:4px;
    background:var(--ink);
    color:var(--parchment);
    cursor:pointer;
    transition:background .2s, transform .1s;
  }
  #unlock-btn:hover{ background:var(--violet-dark); }
  #unlock-btn:active{ transform:scale(0.98); }
  #unlock-btn:disabled{ opacity:0.6; cursor:default; }
  #lock-error{ color:var(--coral-dark); font-size:13px; min-height:18px; margin:0; }

  /* ---------- App layout ---------- */
  #app{ display:none; min-height:100vh; }
  .layout{
    max-width:1100px;
    margin:0 auto;
    padding:48px 24px 100px;
    display:grid;
    grid-template-columns:230px 1fr;
    gap:44px;
  }
  header.masthead{
    grid-column:1 / -1;
    margin-bottom:8px;
    border-bottom:1px solid rgba(255,248,238,0.15);
    padding-bottom:24px;
  }
  header.masthead h1{ color:var(--parchment); font-size:34px; margin:0; }
  header.masthead .tagline{ color:rgba(255,248,238,0.55); font-size:13px; margin-top:6px; }

  /* Sidebar */
  aside.archive{ position:sticky; top:32px; align-self:start; }
  .archive h3{
    color:rgba(255,248,238,0.55);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    margin:0 0 14px;
    font-family:'Inter',sans-serif;
    font-weight:600;
  }
  .archive-all{
    display:block;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    color:var(--parchment);
    font-family:'Fraunces', serif;
    font-size:16px;
    padding:6px 0;
    cursor:pointer;
    margin-bottom:10px;
    opacity:0.85;
  }
  .archive-all.active{ color:var(--gold); opacity:1; }
  .year-block{ margin-bottom:6px; }
  .year-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    background:none;
    border:none;
    color:var(--parchment);
    font-family:'Fraunces', serif;
    font-size:17px;
    padding:8px 0;
    cursor:pointer;
    opacity:0.9;
  }
  .year-btn .count{ font-family:'Space Mono', monospace; font-size:11px; color:rgba(255,248,238,0.45); }
  .month-list{
    list-style:none;
    margin:0 0 6px;
    padding:0 0 0 4px;
    display:none;
    border-left:2px solid rgba(255,248,238,0.15);
  }
  .month-list.open{ display:block; }
  .month-btn{
    display:flex;
    justify-content:space-between;
    width:100%;
    background:none;
    border:none;
    color:rgba(255,248,238,0.7);
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    padding:7px 0 7px 14px;
    cursor:pointer;
    text-transform:capitalize;
  }
  .month-btn:hover{ color:var(--parchment); }
  .month-btn.active{ color:var(--gold); font-weight:600; }
  .month-btn .count{ font-family:'Space Mono', monospace; font-size:11px; color:rgba(255,248,238,0.4); }

  /* Posts */
  main{ min-width:0; }
  #filter-label{ color:rgba(255,248,238,0.55); font-size:13px; margin:0 0 20px; }
  #posts-list{ display:flex; flex-direction:column; gap:22px; }
  .post-card{
    background:var(--parchment);
    border-radius:6px;
    padding:28px 30px;
    box-shadow:0 10px 24px rgba(0,0,0,0.18);
    border-left:6px solid var(--violet);
  }
  .post-meta{ font-size:11.5px; color:var(--muted); margin-bottom:8px; }
  .post-card h2{ font-size:22px; margin:0 0 12px; color:var(--ink); }
  .post-body{
    font-size:15px;
    line-height:1.75;
    color:var(--ink-text);
    white-space:pre-wrap;
    margin-bottom:14px;
  }
  .post-images{ display:flex; flex-wrap:wrap; gap:10px; }
  .post-images img{
    max-width:220px;
    max-height:220px;
    object-fit:cover;
    border-radius:4px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    cursor:zoom-in;
  }
  #empty-state{ text-align:center; padding:60px 20px; color:rgba(255,248,238,0.5); }
  #empty-state h3{ color:rgba(255,248,238,0.8); font-size:20px; margin-bottom:8px; }
  #empty-state p{ font-size:14px; }

  /* Comments */
  .comments{ margin-top:24px; padding-top:20px; border-top:1px solid #E4D8C0; }
  .comments-heading{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    font-weight:600;
    margin:0 0 14px;
  }
  .comment-list{ display:flex; flex-direction:column; gap:14px; margin-bottom:18px; }
  .comment-item{ background:#FBF3E4; border-radius:4px; padding:12px 14px; }
  .comment-meta{ font-size:12px; margin-bottom:4px; color:var(--muted); }
  .comment-name{ font-weight:600; color:var(--ink); }
  .comment-text{ font-size:14px; line-height:1.6; color:var(--ink-text); white-space:pre-wrap; }
  .comment-form{ display:flex; flex-direction:column; gap:8px; }
  .comment-name-input, .comment-text-input{
    font-family:'Inter',sans-serif;
    font-size:14px;
    padding:10px 12px;
    border:1.5px solid #E4D8C0;
    border-radius:4px;
    background:#fff;
    color:var(--ink);
    outline:none;
  }
  .comment-name-input:focus, .comment-text-input:focus{ border-color:var(--violet); }
  .comment-text-input{ min-height:70px; resize:vertical; font-family:'Inter',sans-serif; }
  .comment-form-actions{ display:flex; justify-content:flex-end; }
  .comment-submit{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    background:var(--ink);
    color:var(--parchment);
    border:none;
    padding:9px 18px;
    border-radius:4px;
    cursor:pointer;
  }
  .comment-submit:hover{ background:var(--violet-dark); }
  .comment-submit:disabled{ opacity:0.6; cursor:default; }
  .comment-status{ font-size:12px; margin:6px 0 0; min-height:16px; }
  .comment-status.error{ color:var(--coral-dark); }
  .comment-reply-toggle{
    background:none; border:none; cursor:pointer; padding:0; margin-top:8px;
    font-family:'Inter',sans-serif; font-size:12px; font-weight:600; color:var(--violet-dark);
  }
  .comment-reply-toggle:hover{ text-decoration:underline; }
  .comment-children{
    margin-top:12px;
    padding-left:14px;
    border-left:2px solid #E4D8C0;
    display:flex; flex-direction:column; gap:12px;
  }
  .reply-form{ margin-top:10px; }

  /* Lightbox */
  #lightbox{
    display:none;
    position:fixed;
    inset:0;
    z-index:200;
    background:rgba(15,12,25,0.9);
    align-items:center;
    justify-content:center;
    padding:32px;
    cursor:zoom-out;
  }
  #lightbox.open{ display:flex; }
  #lightbox img{
    max-width:100%;
    max-height:100%;
    border-radius:6px;
    box-shadow:0 30px 70px rgba(0,0,0,0.5);
  }

  @media (max-width:760px){
    .layout{ grid-template-columns:1fr; }
    aside.archive{ position:static; }
  }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="seal-card">
    <div class="seal" id="seal">VB</div>
    <h1>Vides Blogg</h1>
    <p class="sub">Ett privat rum för ord. Ange lösenordet för att öppna sidan.</p>
    <form id="lock-form">
      <input type="password" id="password-input" placeholder="Lösenord" autocomplete="off">
      <p id="lock-error"></p>
      <button type="submit" id="unlock-btn">Lås upp</button>
    </form>
  </div>
</div>

<div id="app">
  <div class="layout">
    <header class="masthead">
      <h1>Vides Blogg</h1>
      <p class="tagline meta" id="tagline-text">en samling anteckningar, tankar och resor</p>
    </header>

    <aside class="archive">
      <h3>Arkiv</h3>
      <button class="archive-all active" id="show-all">Alla inlägg</button>
      <div id="year-list"></div>
    </aside>

    <main>
      <p id="filter-label"></p>
      <div id="posts-list"></div>
      <div id="empty-state" style="display:none;">
        <h3>Inga inlägg ännu</h3>
        <p>Nya inlägg dyker upp här så fort de publiceras.</p>
      </div>
    </main>
  </div>
</div>

<div id="lightbox">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
/* ---------- Crypto helpers ----------
   Posts are stored encrypted in posts.json. The site password is never
   compared as a string: it's used to derive an AES key via PBKDF2, and
   that key either successfully decrypts the stored "check" value or it
   doesn't. This means posts.json is safe to publish in a public repo —
   fetching it directly only yields salt/IV/ciphertext, never plaintext. */
const PBKDF2_ITERATIONS = 150000;
/* Cloudflare Workers cap PBKDF2 at 100,000 iterations, so comments use
   their own key (posts.json's commentAuth field) derived at this lower
   count — kept separate from the main 150k scheme used for post content. */
const COMMENTS_PBKDF2_ITERATIONS = 100000;
const CHECK_PLAINTEXT = 'lov-och-black-ok';
const DEFAULT_TAGLINE = 'en samling anteckningar, tankar och resor';
/* The Worker also serves posts.json/comments.json live (see
   worker/comments-worker.js) so this page never has to wait on a GitHub
   Pages rebuild to see new posts or comments. */
const WORKER_URL = 'https://my-worker.sam-metsi.workers.dev/';

function b64ToBuf(b64){
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for(let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}
function bufToB64(buf){
  let bin = '';
  const bytes = new Uint8Array(buf);
  for(let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
async function deriveKey(password, saltB64, iterations){
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64ToBuf(saltB64), iterations:iterations, hash:'SHA-256' },
    baseKey,
    { name:'AES-GCM', length:256 },
    false,
    ['decrypt']
  );
}
async function decryptText(key, field){
  const pt = await crypto.subtle.decrypt(
    { name:'AES-GCM', iv:b64ToBuf(field.iv) },
    key,
    b64ToBuf(field.ct)
  );
  return new TextDecoder().decode(pt);
}

const lockScreen = document.getElementById('lock-screen');
const app = document.getElementById('app');
const lockForm = document.getElementById('lock-form');
const passwordInput = document.getElementById('password-input');
const lockError = document.getElementById('lock-error');
const unlockBtn = document.getElementById('unlock-btn');
const seal = document.getElementById('seal');

let cryptoKey = null;
let commentsKey = null;
let rawData = null;
let sitePassword = null;
let allComments = [];

async function attemptUnlock(password){
  const res = await fetch(WORKER_URL + 'posts', {cache:'no-store'});
  if(!res.ok){
    throw new Error('Kunde inte hämta inlägg (' + res.status + ').');
  }
  const data = await res.json();

  if(!data || !data.salt){
    cryptoKey = null;
    commentsKey = null;
    rawData = { posts:[] };
    return true;
  }

  const key = await deriveKey(password, data.salt, PBKDF2_ITERATIONS);
  try{
    const check = await decryptText(key, data.check);
    if(check !== CHECK_PLAINTEXT) return false;
  } catch(err){
    return false;
  }
  cryptoKey = key;
  rawData = data;
  commentsKey = data.commentAuth
    ? await deriveKey(password, data.commentAuth.salt, COMMENTS_PBKDF2_ITERATIONS)
    : null;
  return true;
}

lockForm.addEventListener('submit', async function(e){
  e.preventDefault();
  unlockBtn.disabled = true;
  try{
    const ok = await attemptUnlock(passwordInput.value);
    if(ok){
      sitePassword = passwordInput.value;
      seal.classList.add('cracked');
      lockError.textContent = '';
      setTimeout(async function(){
        lockScreen.style.display = 'none';
        app.style.display = 'block';
        await loadComments();
        loadPosts();
      }, 350);
      return;
    }
    showLockError('Fel lösenord. Försök igen.');
  } catch(err){
    showLockError(err.message || 'Något gick fel. Försök igen.');
  } finally {
    unlockBtn.disabled = false;
  }
});

function showLockError(msg){
  lockError.textContent = msg;
  passwordInput.classList.remove('shake');
  void passwordInput.offsetWidth;
  passwordInput.classList.add('shake');
  passwordInput.value = '';
}

const yearListEl = document.getElementById('year-list');
const showAllBtn = document.getElementById('show-all');
const postsListEl = document.getElementById('posts-list');
const emptyStateEl = document.getElementById('empty-state');
const filterLabelEl = document.getElementById('filter-label');

let allPosts = [];
let activeFilter = null;

const MONTHS_SV = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];

async function loadPosts(){
  document.getElementById('tagline-text').textContent = (rawData && rawData.tagline) || DEFAULT_TAGLINE;
  const decrypted = [];
  if(cryptoKey && rawData && rawData.posts){
    for(const p of rawData.posts){
      try{
        const title = await decryptText(cryptoKey, p.title);
        const body = await decryptText(cryptoKey, p.body);
        decrypted.push({ id:p.id, date:p.date, images:p.images || [], title:title, body:body });
      } catch(err){
        /* skip a post that fails to decrypt rather than break the whole page */
      }
    }
  }
  allPosts = decrypted;
  allPosts.sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
  buildArchive();
  renderPosts();
}

async function loadComments(){
  let list = [];
  try{
    const res = await fetch(WORKER_URL + 'comments', {cache:'no-store'});
    if(res.ok) list = await res.json();
  } catch(err){
    list = [];
  }
  if(!Array.isArray(list)) list = [];

  const decrypted = [];
  if(commentsKey){
    for(const c of list){
      try{
        const name = await decryptText(commentsKey, c.name);
        const text = await decryptText(commentsKey, c.text);
        decrypted.push({ id:c.id, postId:c.postId, parentId:c.parentId || null, date:c.date, name:name, text:text });
      } catch(err){
        /* skip a comment that fails to decrypt rather than break the page */
      }
    }
  }
  allComments = decrypted;
}

function buildArchive(){
  const tree = {};
  allPosts.forEach(function(post){
    const d = new Date(post.date);
    const y = d.getFullYear();
    const m = d.getMonth();
    if(!tree[y]) tree[y] = {};
    if(!tree[y][m]) tree[y][m] = 0;
    tree[y][m]++;
  });
  const years = Object.keys(tree).sort(function(a,b){ return b - a; });
  yearListEl.innerHTML = '';
  years.forEach(function(year){
    const yearBlock = document.createElement('div');
    yearBlock.className = 'year-block';

    const yearCount = Object.values(tree[year]).reduce(function(a,b){ return a+b; }, 0);
    const yearBtn = document.createElement('button');
    yearBtn.className = 'year-btn';
    yearBtn.innerHTML = '<span>' + year + '</span><span class="count">' + yearCount + '</span>';

    const monthList = document.createElement('ul');
    monthList.className = 'month-list';

    const months = Object.keys(tree[year]).sort(function(a,b){ return b - a; });
    months.forEach(function(m){
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'month-btn';
      btn.dataset.year = year;
      btn.dataset.month = m;
      btn.innerHTML = '<span>' + MONTHS_SV[m] + '</span><span class="count">' + tree[year][m] + '</span>';
      btn.addEventListener('click', function(){
        activeFilter = {year: parseInt(year), month: parseInt(m)};
        document.querySelectorAll('.month-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        showAllBtn.classList.remove('active');
        renderPosts();
      });
      li.appendChild(btn);
      monthList.appendChild(li);
    });

    yearBtn.addEventListener('click', function(){
      monthList.classList.toggle('open');
    });

    yearBlock.appendChild(yearBtn);
    yearBlock.appendChild(monthList);
    yearListEl.appendChild(yearBlock);
  });

  if(years.length > 0){
    yearListEl.querySelector('.month-list').classList.add('open');
  }
}

showAllBtn.addEventListener('click', function(){
  activeFilter = null;
  document.querySelectorAll('.month-btn').forEach(function(b){ b.classList.remove('active'); });
  showAllBtn.classList.add('active');
  renderPosts();
});

function formatDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('sv-SE', { year:'numeric', month:'long', day:'numeric' });
}

function renderPosts(){
  let posts = allPosts;
  if(activeFilter){
    posts = allPosts.filter(function(p){
      const d = new Date(p.date);
      return d.getFullYear() === activeFilter.year && d.getMonth() === activeFilter.month;
    });
    filterLabelEl.textContent = 'Visar inlägg från ' + MONTHS_SV[activeFilter.month] + ' ' + activeFilter.year;
  } else {
    filterLabelEl.textContent = 'Visar alla inlägg';
  }

  postsListEl.innerHTML = '';
  if(posts.length === 0){
    emptyStateEl.style.display = 'block';
    return;
  }
  emptyStateEl.style.display = 'none';

  posts.forEach(function(post){
    const card = document.createElement('div');
    card.className = 'post-card';

    let imagesHtml = '';
    if(post.images && post.images.length){
      imagesHtml = '<div class="post-images">' + post.images.map(function(src){
        return '<img src="' + escapeHtml(src) + '" alt="">';
      }).join('') + '</div>';
    }

    card.innerHTML =
      '<div class="post-meta meta">' + formatDate(post.date) + '</div>' +
      '<h2>' + escapeHtml(post.title) + '</h2>' +
      '<div class="post-body">' + escapeHtml(post.body) + '</div>' +
      imagesHtml +
      renderComments(post.id);

    postsListEl.appendChild(card);
  });
}

function buildCommentTree(postId){
  const postComments = allComments.filter(function(c){ return c.postId === postId; });
  const byId = {};
  postComments.forEach(function(c){ byId[c.id] = Object.assign({}, c, { children:[] }); });
  const roots = [];
  postComments.forEach(function(c){
    const node = byId[c.id];
    if(c.parentId && byId[c.parentId]){
      byId[c.parentId].children.push(node);
    } else {
      roots.push(node);
    }
  });
  function sortTree(nodes){
    nodes.sort(function(a,b){ return new Date(a.date) - new Date(b.date); });
    nodes.forEach(function(n){ sortTree(n.children); });
  }
  sortTree(roots);
  return roots;
}

function countComments(nodes){
  return nodes.reduce(function(sum, n){ return sum + 1 + countComments(n.children); }, 0);
}

function renderCommentForm(postId, parentId){
  return (
    '<form class="comment-form' + (parentId ? ' reply-form' : '') + '"' +
      ' data-post-id="' + escapeHtml(postId) + '"' +
      (parentId ? ' data-parent-id="' + escapeHtml(parentId) + '" style="display:none;"' : '') + '>' +
      '<input type="text" class="comment-name-input" placeholder="Namn" maxlength="100" required>' +
      '<textarea class="comment-text-input" placeholder="' + (parentId ? 'Skriv ett svar...' : 'Skriv en kommentar...') + '" maxlength="2000" required></textarea>' +
      '<div class="comment-form-actions">' +
        '<button type="submit" class="comment-submit">Skicka</button>' +
      '</div>' +
      '<p class="comment-status"></p>' +
    '</form>'
  );
}

function renderCommentNode(node){
  let html = '<div class="comment-item">' +
    '<div class="comment-meta"><span class="comment-name">' + escapeHtml(node.name) + '</span> · <span class="meta">' + formatDate(node.date) + '</span></div>' +
    '<div class="comment-text">' + escapeHtml(node.text) + '</div>' +
    '<button type="button" class="comment-reply-toggle" data-comment-id="' + escapeHtml(node.id) + '">Svara</button>' +
    renderCommentForm(node.postId, node.id);
  if(node.children.length){
    html += '<div class="comment-children">' + node.children.map(renderCommentNode).join('') + '</div>';
  }
  html += '</div>';
  return html;
}

function renderComments(postId){
  const tree = buildCommentTree(postId);
  const total = countComments(tree);

  let listHtml = '';
  if(tree.length){
    listHtml = '<div class="comment-list">' + tree.map(renderCommentNode).join('') + '</div>';
  }

  const heading = 'Kommentarer' + (total ? ' (' + total + ')' : '');

  return (
    '<div class="comments">' +
      '<h3 class="comments-heading">' + heading + '</h3>' +
      listHtml +
      renderCommentForm(postId, null) +
    '</div>'
  );
}

postsListEl.addEventListener('click', function(e){
  const toggle = e.target.closest('.comment-reply-toggle');
  if(!toggle) return;
  const form = toggle.nextElementSibling;
  if(form && form.classList.contains('reply-form')){
    form.style.display = form.style.display === 'none' ? 'flex' : 'none';
  }
});

postsListEl.addEventListener('submit', async function(e){
  const form = e.target.closest('.comment-form');
  if(!form) return;
  e.preventDefault();

  const postId = form.dataset.postId;
  const parentId = form.dataset.parentId || null;
  const nameInput = form.querySelector('.comment-name-input');
  const textInput = form.querySelector('.comment-text-input');
  const statusEl = form.querySelector('.comment-status');
  const submitBtn = form.querySelector('.comment-submit');

  const name = nameInput.value.trim();
  const text = textInput.value.trim();
  if(!name || !text) return;

  submitBtn.disabled = true;
  statusEl.textContent = 'Skickar...';
  statusEl.className = 'comment-status';

  try{
    const res = await fetch(WORKER_URL + 'comment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ postId:postId, parentId:parentId, password:sitePassword, name:name, text:text })
    });
    const result = await res.json().catch(function(){ return {}; });
    if(!res.ok || result.error){
      throw new Error(result.error || ('Kunde inte skicka (' + res.status + ')'));
    }
    /* The Worker's success response means the comment is already committed
       to GitHub — re-fetching comments.json here would almost always show
       the stale version, since GitHub Pages can take a minute or more to
       rebuild after a commit. Show it locally right away instead; other
       visitors (and this browser, on next reload) pick it up once the
       rebuild catches up. */
    allComments.push({ id:'local_' + Date.now(), postId:postId, parentId:parentId, date:new Date().toISOString(), name:name, text:text });
    renderPosts();
  } catch(err){
    statusEl.textContent = err.message;
    statusEl.className = 'comment-status error';
    submitBtn.disabled = false;
  }
});

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

postsListEl.addEventListener('click', function(e){
  const img = e.target.closest('.post-images img');
  if(!img) return;
  lightboxImg.src = img.src;
  lightbox.classList.add('open');
});

lightbox.addEventListener('click', function(){
  lightbox.classList.remove('open');
  lightboxImg.src = '';
});

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  }
});

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
</script>
